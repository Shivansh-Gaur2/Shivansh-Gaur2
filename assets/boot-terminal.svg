<svg width="900" height="270" viewBox="0 0 900 270" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Courier New', monospace; }
    .l1,.l2,.l3,.l4,.l5 { opacity: 0; font-size: 17px; fill: #00ff41; }
    .l5 { fill: #7ee787; }
    .l1 { animation: line1 9s infinite; }
    .l2 { animation: line2 9s infinite; }
    .l3 { animation: line3 9s infinite; }
    .l4 { animation: line4 9s infinite; }
    .l5 { animation: line5 9s infinite; }
    .cursor { animation: blink 1s steps(1) infinite; fill: #7ee787; }
    @keyframes line1 { 0%{opacity:0} 4%{opacity:1} 88%{opacity:1} 93%{opacity:0} 100%{opacity:0} }
    @keyframes line2 { 0%{opacity:0} 19%{opacity:0} 23%{opacity:1} 88%{opacity:1} 93%{opacity:0} 100%{opacity:0} }
    @keyframes line3 { 0%{opacity:0} 34%{opacity:0} 38%{opacity:1} 88%{opacity:1} 93%{opacity:0} 100%{opacity:0} }
    @keyframes line4 { 0%{opacity:0} 49%{opacity:0} 53%{opacity:1} 88%{opacity:1} 93%{opacity:0} 100%{opacity:0} }
    @keyframes line5 { 0%{opacity:0} 64%{opacity:0} 68%{opacity:1} 88%{opacity:1} 93%{opacity:0} 100%{opacity:0} }
    @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }
  </style>

  <rect width="900" height="270" fill="#0d1117"/>
  <rect x="8" y="8" width="884" height="254" fill="none" stroke="#00ff41" stroke-opacity="0.35" stroke-width="1.5"/>

  <circle cx="30" cy="28" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="28" r="6" fill="#27c93f"/>
  <text x="450" y="33" text-anchor="middle" font-size="13" fill="#8b949e">shivansh@pathlock:~</text>

  <text x="30" y="70" font-size="14" fill="#8b949e">$ ./boot.sh --verbose</text>

  <text x="30" y="105" class="l1">[ OK ] Loading backend_engineer.module</text>
  <text x="30" y="135" class="l2">[ OK ] Mounting distributed_systems/</text>
  <text x="30" y="165" class="l3">[ OK ] Starting service: problem-solver.daemon</text>
  <text x="30" y="195" class="l4">[ OK ] Verified: 1000+ problems solved, Knight rank</text>
  <text x="30" y="225" class="l5">[READY] status: focused, shipping code <tspan class="cursor">&#9608;</tspan></text>
</svg>
